syntax = "proto2";

package legionclaw.planning;

import "modules/common/base_message/message.proto";
import "modules/planning/src/proto/driving/lattice_planner_conf.proto";
import "modules/planning/src/proto/parking/parking_conf.proto";
import "modules/common/data/vehicle_param/proto/vehicle_param.proto";

message PlanningConf {
  optional string app_name = 1 [default = ""];
  optional string description = 2 [default = ""];
  optional string log_file_path = 3 [default = ""];
  optional int32 log_level = 4 [default = 0];
  optional bool logging_data_enable = 5 [default = false];
  optional bool enable_log_debug = 6 [default = false];
  optional double produce_planning_command_duration = 7 [default = 0.0];
  optional double publish_planning_command_duration = 8 [default = 0.0];
  optional bool use_system_timestamp = 9;
  optional bool enable_local_map_topic = 10;
  optional bool enable_elevation = 11;
  optional double min_speed = 12;
  optional double threshold_static_speed = 13;
  optional double threshold_static_speed_self = 14;
  optional double path_density = 15;
  optional double look_forward_time_sec = 16;
  optional double look_forward_long_distance = 17;
  optional double look_forward_short_distance = 18;
  optional double look_backward_distance = 19;
  optional double look_forward_extend_distance = 20;
  optional double reference_line_stitch_overlap_distance = 21;
  optional bool enable_lane_change = 22;
  optional bool enable_swerving = 23;
  optional bool enable_following = 24;
  optional bool enable_cutin = 25;
  optional bool enable_traffic_light_behavior = 26;
  optional bool enable_stop_sign_behavior = 27;
  optional bool enable_inward_outward_behavior = 28;
  optional double baselen_collison_check = 29;
  optional double speedcoeff_collision_check = 30;
  optional int32 map_spline_order = 31;
  optional double map_match_error = 32;
  optional double lane_match_tolerance = 33;
  optional double norm_acceleration = 34;
  optional double norm_deceleration = 35;
  optional double anchor_sampling_step = 36;
  optional double knots_sampling_step = 37;
  optional double lateral_bound_limit = 38;
  optional double safe_width = 39;
  optional double safe_length = 40;
  optional double safe_width_lower_limit = 41;
  optional double safe_length_lower_limit = 42;
  optional double safe_dis_speed_lower_limit = 43;
  optional double safe_dis_speed_upper_limit = 44;
  optional double emergency_time_interval = 45;
  optional double emergency_lower_limit_length = 46;
  optional double decision_yield_distance = 47;
  optional double yield_offset = 48;
  optional double virtual_length_max = 49;

  optional legion.common.Message messages = 51; 
  optional LatticePlannerConf lattice_planner_conf = 52;
  optional ParkingConf parking_conf = 53;
  optional legion.interface.VehicleParam vehicle_param = 54;

  optional StatusConfig status = 55;
}

message StatusConfig {
  optional double status_detect_duration = 1;
}


