syntax = "proto2";

package legionclaw.common;

enum MessageType {
  LCM = 0;
  DDS = 1;
  ROS = 2;
  ADSFI = 3;
  ROS2 = 4;
}

message Message {
    repeated int32 active_message = 1;
    repeated MessageInfo message_info = 2;
    map<string,MessageInfo> messages_map = 3;
}

message MessageInfo {
    optional int32 type = 1 ;
    optional string name = 2 ;
    optional string url=3 ;
}
