syntax = "proto2";

package legionclaw.interface;

import "modules/common/proto/header.proto";
import "modules/common/proto/point_3d.proto";
import "modules/common/proto/lane_info_extend.proto";


message LocalMap{
    //timestamp is included in header
    optional Header header = 1;
    //Sequence number，lane_list数据有更新则加1，否则保持不变
    optional int32 seq = 2 [default = 0];
    //生成该LocalMap局部地图消息时的自车位置
    optional Point3D ego_point = 3;
    //生成该LocalMap局部地图消息的范围，以ego_point为中心，range为边长的正方形，单位：m
    optional double range = 4 [default = 0.0];
    //自车周边LocalMap范围内的车道信息列表
    repeated LaneInfoExtend lane_list = 5;
}
